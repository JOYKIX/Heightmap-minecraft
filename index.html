<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Heightmap Minecraft / WorldPainter</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <header class="topbar">
      <h1>Heightmap Minecraft Studio</h1>
      <label>Seed <input id="seedInput" value="default" /></label>
      <span id="statusText">Prêt</span>
    </header>

    <main class="layout">
      <aside class="panel left">
        <h2>Paramètres</h2>
        <label>Preset <select id="presetSelect"></select></label>
        <label>Taille
          <select id="sizeSelect">
            <option value="512">512 (rapide)</option>
            <option value="1024" selected>1024 (stable)</option>
            <option value="2048">2048 (possible)</option>
            <option value="4096">4096 (warning)</option>
          </select>
        </label>
        <label>Land coverage <input id="landCoverage" type="number" step="0.01" min="0.2" max="0.8" value="0.45" /></label>
        <label>Ocean border
          <select id="oceanBorder">
            <option value="small">small (8%)</option>
            <option value="standard" selected>standard (15%)</option>
            <option value="large">large (25%)</option>
            <option value="huge">huge (35%)</option>
          </select>
        </label>
        <label>Rivières
          <select id="riverAmount">
            <option value="few">few</option>
            <option value="some" selected>some</option>
            <option value="many">many</option>
          </select>
        </label>

        <div class="buttons">
          <button id="btnGenerate">Générer</button>
          <button id="btnRandomSeed">Seed aléatoire</button>
          <button id="btnExportPng">Export PNG</button>
          <button id="btnExportJson">Export JSON</button>
          <button id="btnReset">Reset</button>
        </div>
      </aside>

      <section class="center">
        <div class="preview-toolbar">
          <label>Mode aperçu <select id="previewMode"></select></label>
        </div>
        <canvas id="previewCanvas" width="1024" height="1024"></canvas>
      </section>

      <aside class="panel right">
        <div id="statsPanel"></div>
        <div id="wpSettings"></div>
      </aside>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
