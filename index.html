<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Minecraft Surface Heightmap Lab</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="shell">
      <aside class="panel left">
        <h1>Surface Heightmap Lab</h1>
        <p class="subtitle">Génération surface-only Minecraft / WorldPainter (aucune couche underground).</p>

        <section class="card">
          <h2>Projet</h2>
          <div class="row two">
            <label>Largeur <input id="width" type="number" min="256" max="4096" step="256" value="1024" /></label>
            <label>Hauteur <input id="height" type="number" min="256" max="4096" step="256" value="1024" /></label>
          </div>
          <label>Seed <input id="seed" type="text" value="minecraft-surface" /></label>
          <label>Preset <select id="preset"></select></label>
          <label class="check"><input id="safe-mode" type="checkbox" checked /> WorldPainter Safe</label>
          <button id="generate">Générer le terrain</button>
          <div class="progress-wrap"><div id="progress"></div></div>
          <p id="pipeline-step">Idle</p>
        </section>

        <section class="card">
          <h2>Masse terrestre & côtes</h2>
          <label>Sea level (Y) <input id="sea-level" type="range" min="48" max="96" value="64" /><span id="sea-level-val"></span></label>
          <label>Island size <input id="island-size" type="range" min="0.3" max="1.6" step="0.01" value="1" /><span id="island-size-val"></span></label>
          <label>Landmass scale <input id="landmass-scale" type="range" min="0.2" max="2" step="0.01" value="0.9" /><span id="landmass-scale-val"></span></label>
          <label>Landmass density <input id="landmass-density" type="range" min="0" max="1" step="0.01" value="0.56" /><span id="landmass-density-val"></span></label>
          <label>Coastline complexity <input id="coastline-complexity" type="range" min="0" max="1" step="0.01" value="0.68" /><span id="coastline-complexity-val"></span></label>
          <label>Coast fragmentation <input id="coast-fragmentation" type="range" min="0" max="1" step="0.01" value="0.42" /><span id="coast-fragmentation-val"></span></label>
          <label>Island asymmetry <input id="island-asymmetry" type="range" min="0" max="1" step="0.01" value="0.52" /><span id="island-asymmetry-val"></span></label>
          <label>Archipelago amount <input id="archipelago-amount" type="range" min="0" max="1" step="0.01" value="0.34" /><span id="archipelago-amount-val"></span></label>
          <label>Coast erosion <input id="coast-erosion" type="range" min="0" max="1" step="0.01" value="0.46" /><span id="coast-erosion-val"></span></label>
        </section>

        <section class="card">
          <h2>Relief de surface</h2>
          <label>Mountain intensity <input id="mountain-intensity" type="range" min="0" max="1" step="0.01" value="0.72" /><span id="mountain-intensity-val"></span></label>
          <label>Ridge sharpness <input id="ridge-sharpness" type="range" min="0.5" max="3" step="0.01" value="1.65" /><span id="ridge-sharpness-val"></span></label>
          <label>Alpine effect <input id="alpine-effect" type="range" min="0" max="1" step="0.01" value="0.55" /><span id="alpine-effect-val"></span></label>
          <label>Massif size <input id="massif-size" type="range" min="0.3" max="2.5" step="0.01" value="1.1" /><span id="massif-size-val"></span></label>
          <label>Peak amount <input id="peak-amount" type="range" min="0" max="1" step="0.01" value="0.4" /><span id="peak-amount-val"></span></label>
          <label>Valley strength <input id="valley-strength" type="range" min="0" max="1" step="0.01" value="0.58" /><span id="valley-strength-val"></span></label>
          <label>River density <input id="river-density" type="range" min="0" max="1" step="0.01" value="0.45" /><span id="river-density-val"></span></label>
          <label>Erosion strength <input id="erosion-strength" type="range" min="0" max="1" step="0.01" value="0.48" /><span id="erosion-strength-val"></span></label>
          <label>Terrain sharpness <input id="terrain-sharpness" type="range" min="0.5" max="2.5" step="0.01" value="1.28" /><span id="terrain-sharpness-val"></span></label>
          <label>Plateau amount <input id="plateau-amount" type="range" min="0" max="1" step="0.01" value="0.28" /><span id="plateau-amount-val"></span></label>
          <label>Cliff amount <input id="cliff-amount" type="range" min="0" max="1" step="0.01" value="0.37" /><span id="cliff-amount-val"></span></label>
          <label>Terrain variation <input id="terrain-variation" type="range" min="0" max="1" step="0.01" value="0.62" /><span id="terrain-variation-val"></span></label>
        </section>

        <section class="card">
          <h2>Export</h2>
          <button id="download-png">Exporter PNG 8-bit grayscale</button>
          <button id="download-pgm16">Exporter PGM 16-bit grayscale</button>
          <button id="download-json">Exporter preset JSON</button>
        </section>
      </aside>

      <main class="center">
        <div class="toolbar">
          <label>Preview
            <select id="preview-mode">
              <option value="grayscale">Grayscale</option>
              <option value="hillshade">Hillshade</option>
              <option value="topographic">Topographic</option>
              <option value="biome-coloring">Biome coloring</option>
              <option value="slope-preview">Slope preview</option>
              <option value="contour-preview">Contour preview</option>
            </select>
          </label>
          <label>Zoom <input id="zoom" type="range" min="1" max="6" step="0.1" value="1" /></label>
          <label class="check"><input id="show-grid" type="checkbox" /> grille 64x64</label>
        </div>
        <div class="viewport" id="viewport">
          <canvas id="canvas" width="1024" height="1024"></canvas>
        </div>
      </main>

      <aside class="panel right">
        <section class="card">
          <h2>Statistiques & mapping</h2>
          <ul id="stats"></ul>
        </section>
        <section class="card">
          <h2>Distribution altitudes</h2>
          <canvas id="histogram" width="320" height="140"></canvas>
          <p class="hint">Surface-only : océan, côtes, plaines, collines, montagnes, pics.</p>
        </section>
      </aside>
    </div>

    <script src="script.js"></script>
  </body>
</html>
